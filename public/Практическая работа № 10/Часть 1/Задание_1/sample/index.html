<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Программирование на языке PHP</title>
</head>	
<body>

	<h1>Отправка данных на сервер</h1>
	<h2>Отправка форм</h2>

	<!-- Форма отправляет данные на server.php методом POST -->
	<form action="server.php" method="post">
		Фамилия: <input type="text" name="surname"><p>
		Имя: <input type="text" name="name"><p>
		Отчество: <input type="text" name="fontname"><p>
		Должность: <input type="text" name="dolzhnost"><p>
		
		Уровень образования: 
		<!-- Добавлен атрибут name для списка -->
		<select name="education_level">
			<option value="Высшее (бакалавриат)">Высшее (бакалавриат)</option>
			<option value="Высшее (специалитет, магистратура)">Высшее (специалитет, магистратура)</option>
			<option value="Подготовка кадров высшей квалификации">Подготовка кадров высшей квалификации</option>
			<option value="Среднее профессиональное">Среднее профессиональное</option>
		</select><p>
		
		Категория: 
		<!-- Добавлены одинаковые name для группы radio и разные value -->
		Высшая <input type="radio" name="category" value="Высшая">
		Первая <input type="radio" name="category" value="Первая">
		Соответствие занимаемой должности <input type="radio" name="category" value="Соответствие занимаемой должности"><p>
		
		<!-- Добавлены атрибуты name для полей стажа -->
		Общий стаж: <input type="number" name="total_experience" step="0.1"><p>
		Стаж в техникуме: <input type="number" name="college_experience" step="0.1"><p>	
		
		<input type="submit" value="Отправить">
	</form>
	
</body>
</html>
